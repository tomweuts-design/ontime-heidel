<!doctype html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dagplanning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#12151A;
    --surface:#1B2027;
    --surface-2:#242B33;
    --accent:#FFB627;
    --accent-2:#FF6B35;
    --text:#F1F3F5;
    --text-muted:#8D97A3;
    --success:#5FD068;
    --danger:#FF6B6B;
    --border:#2E353E;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', system-ui, sans-serif;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:520px;
    margin:0 auto;
    width:100%;
    flex:1;
    display:flex;
    flex-direction:column;
    padding:0 0 40px;
  }

  /* Header */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 20px 12px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px;height:34px;
    border-radius:8px;
    background:linear-gradient(155deg, var(--accent), var(--accent-2));
    display:flex;align-items:center;justify-content:center;
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:16px;
    color:#12151A;
    flex-shrink:0;
  }
  .brand-text{
    font-family:'Barlow Condensed', sans-serif;
    font-weight:600;
    font-size:20px;
    letter-spacing:0.02em;
    line-height:1.1;
  }
  .brand-sub{
    font-size:11px;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
  }
  .icon-btn{
    background:var(--surface);
    border:1px solid var(--border);
    width:40px;height:40px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    color:var(--text-muted);
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .icon-btn:hover{ border-color:var(--accent); color:var(--accent); }
  .icon-btn:active{ transform:scale(0.96); }

  main{ padding:8px 20px 0; flex:1; }

  /* Greeting */
  .greeting{
    font-size:14px;
    color:var(--text-muted);
    margin:4px 0 18px;
  }
  .greeting strong{ color:var(--text); font-weight:600; }

  /* Board card - signature element */
  .board{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .board-label{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 18px 0;
  }
  .board-label span{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-muted);
    font-weight:600;
  }
  .status-dot{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    color:var(--success);
    text-transform:uppercase;
    letter-spacing:0.08em;
    font-weight:600;
  }
  .status-dot i{
    width:7px;height:7px;border-radius:50%;
    background:var(--success);
    box-shadow:0 0 0 3px rgba(95,208,104,0.18);
  }

  .flap-row{
    display:flex;
    justify-content:center;
    gap:6px;
    padding:18px 18px 10px;
  }
  .flap{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    width:52px;
    height:72px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Barlow Condensed', sans-serif;
    font-weight:700;
    font-size:44px;
    color:var(--accent);
    position:relative;
  }
  .flap::after{
    content:'';
    position:absolute;
    left:0;right:0;top:50%;
    height:1px;
    background:var(--bg);
    opacity:0.5;
  }
  .flap.colon{
    background:none;border:none;width:14px;
    font-size:36px;color:var(--text-muted);
  }
  .flap-date{
    text-align:center;
    font-size:13px;
    color:var(--text-muted);
    padding-bottom:16px;
    text-transform:capitalize;
  }

  .divider{ height:1px; background:var(--border); }

  .location-block{
    padding:18px;
    display:flex;
    gap:12px;
  }
  .location-icon{
    width:36px;height:36px;
    border-radius:9px;
    background:var(--surface-2);
    border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    color:var(--accent);
  }
  .location-text .eyebrow{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-muted);
    font-weight:600;
    margin-bottom:3px;
  }
  .location-text .name{
    font-size:17px;
    font-weight:600;
    line-height:1.3;
  }
  .location-text .addr{
    font-size:13px;
    color:var(--text-muted);
    margin-top:2px;
    line-height:1.4;
  }

  /* Meta footer */
  .meta{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:2px 4px 0;
    font-size:12px;
    color:var(--text-muted);
  }
  .refresh-btn{
    background:none;border:none;
    color:var(--accent);
    font-size:12px;
    font-weight:600;
    display:flex;align-items:center;gap:5px;
    cursor:pointer;
    padding:6px 4px;
  }
  .refresh-btn:active{ opacity:0.6; }
  .refresh-btn svg{ transition:transform .5s; }
  .refresh-btn.spinning svg{ animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* States */
  .state{
    text-align:center;
    padding:60px 24px;
    color:var(--text-muted);
  }
  .state .state-icon{
    font-size:32px;
    margin-bottom:14px;
    opacity:0.6;
  }
  .state h3{
    color:var(--text);
    font-family:'Barlow Condensed', sans-serif;
    font-size:20px;
    font-weight:600;
    margin:0 0 6px;
  }
  .state p{ font-size:13px; margin:0; line-height:1.5; }

  /* Onboarding / settings overlay */
  .overlay{
    position:fixed; inset:0;
    background:rgba(10,12,15,0.72);
    backdrop-filter:blur(3px);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
    padding:0;
  }
  .overlay.centered{ align-items:center; padding:20px; }
  .sheet{
    background:var(--surface);
    border:1px solid var(--border);
    border-bottom:none;
    border-radius:20px 20px 0 0;
    width:100%;
    max-width:520px;
    padding:28px 22px 28px;
  }
  .overlay.centered .sheet{
    border-bottom:1px solid var(--border);
    border-radius:18px;
  }
  .sheet h2{
    font-family:'Barlow Condensed', sans-serif;
    font-size:24px;
    font-weight:600;
    margin:0 0 4px;
  }
  .sheet .sub{
    font-size:13px;
    color:var(--text-muted);
    margin:0 0 20px;
    line-height:1.5;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-muted);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--surface-2);
    border:1px solid var(--border);
    color:var(--text);
    font-size:16px;
    font-family:'IBM Plex Sans', sans-serif;
    padding:13px 14px;
    border-radius:10px;
    outline:none;
    transition:border-color .15s;
  }
  .field input:focus{ border-color:var(--accent); }
  .field-hint{
    font-size:11px;
    color:var(--text-muted);
    margin-top:5px;
  }
  .btn-row{ display:flex; gap:10px; margin-top:22px; }
  .btn{
    flex:1;
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:15px;
    font-weight:600;
    font-family:'IBM Plex Sans', sans-serif;
    cursor:pointer;
  }
  .btn-primary{
    background:var(--accent);
    color:#14181C;
  }
  .btn-primary:active{ opacity:0.85; }
  .btn-primary:disabled{ opacity:0.4; cursor:default; }
  .btn-ghost{
    background:transparent;
    color:var(--text-muted);
    border:1px solid var(--border);
  }
  .error-msg{
    font-size:12px;
    color:var(--danger);
    margin-top:10px;
    display:none;
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="brand-mark">TD</div>
      <div>
        <div class="brand-text">Dagplanning</div>
        <div class="brand-sub" id="vehicleLabel">—</div>
      </div>
    </div>
    <button class="icon-btn" id="settingsBtn" title="Instellingen" aria-label="Instellingen">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <main>
    <div class="greeting" id="greeting"></div>
    <div id="content">
      <!-- gevuld via JS -->
    </div>
  </main>
</div>

<!-- Onboarding: wie ben je -->
<div class="overlay centered" id="onboarding" style="display:none;">
  <div class="sheet">
    <h2>Wie ben je?</h2>
    <p class="sub">Vul je chauffeurs-ID in. Dat gebruiken we om jouw planning op te zoeken.</p>
    <div class="field">
      <label for="obDriverId">Chauffeurs-ID</label>
      <input type="text" id="obDriverId" placeholder="Bv. 9800032501" inputmode="numeric" />
      <div class="field-hint">Dit is je bedrijfs-ID, terug te vinden op je planning.</div>
    </div>
    <div class="error-msg" id="obError">Vul je chauffeurs-ID in.</div>
    <div class="btn-row">
      <button class="btn btn-primary" id="obSave">Opslaan</button>
    </div>
  </div>
</div>

<!-- Settings sheet -->
<div class="overlay" id="settings" style="display:none;">
  <div class="sheet">
    <h2>Instellingen</h2>
    <p class="sub">Pas je chauffeurs-ID aan.</p>
    <div class="field">
      <label for="stDriverId">Chauffeurs-ID</label>
      <input type="text" id="stDriverId" inputmode="numeric" />
    </div>
    <div class="error-msg" id="stError">Vul je chauffeurs-ID in.</div>
    <div class="btn-row">
      <button class="btn btn-ghost" id="stCancel">Annuleren</button>
      <button class="btn btn-primary" id="stSave">Opslaan</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ====== CONFIG: vul hier je eigen Supabase-gegevens in ======
	const SUPABASE_URL = "https://aynrffgnxvcydwmautvd.supabase.co";
	const SUPABASE_ANON_KEY = "sb_publishable_SOiXQoFyH_RGACu2-J0SiQ_14-y0qnI";
  // =============================================================

  const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const $ = (id) => document.getElementById(id);
  const STORAGE_KEY = "dagplanning_profile";

  function getProfile(){
    try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }
    catch(e){ return null; }
  }
  function saveProfile(profile){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(profile));
  }

  function formatFlapDigits(dateStr){
    // geeft { h1,h2,m1,m2, dateLabel }
    const d = new Date(dateStr);
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const dateLabel = d.toLocaleDateString('nl-BE', { weekday:'long', day:'numeric', month:'long' });
    return { h1:hh[0], h2:hh[1], m1:mm[0], m2:mm[1], dateLabel };
  }

  function renderFlapBoard(loadingDateTime){
    if(!loadingDateTime){
      return `<div class="flap-date">Geen laadtijd bekend</div>`;
    }
    const f = formatFlapDigits(loadingDateTime);
    return `
      <div class="flap-row">
        <div class="flap">${f.h1}</div>
        <div class="flap">${f.h2}</div>
        <div class="flap colon">:</div>
        <div class="flap">${f.m1}</div>
        <div class="flap">${f.m2}</div>
      </div>
      <div class="flap-date">${f.dateLabel}</div>
    `;
  }

  function renderLocationBlock(icon, eyebrow, name, address, postcode, city){
    return `
      <div class="location-block">
        <div class="location-icon">${icon}</div>
        <div class="location-text">
          <div class="eyebrow">${eyebrow}</div>
          <div class="name">${name || '—'}</div>
          <div class="addr">${[address, [postcode, city].filter(Boolean).join(' ')].filter(Boolean).join(', ')}</div>
        </div>
      </div>
    `;
  }

  const truckIcon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`;
  const pinIcon = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

  function renderLoading(){
    $('content').innerHTML = `
      <div class="state">
        <div class="state-icon">⏳</div>
        <h3>Planning ophalen…</h3>
        <p>Even geduld.</p>
      </div>
    `;
  }

  function renderEmpty(profile){
    $('content').innerHTML = `
      <div class="state">
        <div class="state-icon">📭</div>
        <h3>Nog geen planning gevonden</h3>
        <p>Er staat momenteel niets klaar voor ID ${profile.driverId}.<br/>Check later opnieuw, of controleer je ID via instellingen.</p>
      </div>
    `;
  }

  function renderNoWork(row){
    $('vehicleLabel').textContent = '—';
    const updated = row.source_updated_at
      ? new Date(row.source_updated_at).toLocaleString('nl-BE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      : '—';
    $('content').innerHTML = `
      <div class="state">
        <div class="state-icon">🌙</div>
        <h3>Geen planning vandaag</h3>
        <p>Er staat momenteel geen rit voor jou klaar.<br/>Normaal verschijnt nieuwe planning rond 18:00 (behalve op zaterdag).</p>
      </div>
      <div class="meta" style="justify-content:center; margin-top:8px;">
        <span>Laatst gecontroleerd: ${updated}</span>
      </div>
      <div style="text-align:center; margin-top:10px;">
        <button class="refresh-btn" id="refreshBtn" style="margin:0 auto;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Vernieuwen
        </button>
      </div>
    `;
    $('refreshBtn').addEventListener('click', () => loadPlanning(true));
  }

  function renderError(){
    $('content').innerHTML = `
      <div class="state">
        <div class="state-icon">⚠️</div>
        <h3>Kon planning niet laden</h3>
        <p>Controleer je internetverbinding en probeer opnieuw.</p>
      </div>
    `;
  }

  function renderPlanning(row){
    $('vehicleLabel').textContent = row.vehicle_number || '—';
    setGreeting(row.driver_firstname);
    const updated = row.source_updated_at
      ? new Date(row.source_updated_at).toLocaleString('nl-BE', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })
      : '—';

    $('content').innerHTML = `
      <div class="board">
        <div class="board-label">
          <span>Laadtijd</span>
          <span class="status-dot"><i></i>Actueel</span>
        </div>
        ${renderFlapBoard(row.loading_datetime)}
        <div class="divider"></div>
        ${renderLocationBlock(truckIcon, 'Truck ophalen bij', row.loading_location_name, row.loading_location_address, row.loading_location_postcode, row.loading_location_city)}
        <div class="divider"></div>
        ${renderLocationBlock(pinIcon, 'Pick-up locatie', row.pickup_location_name, row.pickup_address, row.pickup_postcode, row.pickup_city)}
      </div>
      <div class="meta">
        <span>Laatst bijgewerkt: ${updated}</span>
        <button class="refresh-btn" id="refreshBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Vernieuwen
        </button>
      </div>
    `;
    $('refreshBtn').addEventListener('click', () => loadPlanning(true));
  }

  async function loadPlanning(isManualRefresh){
    const profile = getProfile();
    if(!profile) return;

    const btn = $('refreshBtn');
    if(isManualRefresh && btn) btn.classList.add('spinning');
    if(!isManualRefresh) renderLoading();

    try{
      const { data, error } = await supa
        .from('dagplanning')
        .select('*')
        .eq('driver_id', profile.driverId)
        .limit(1)
        .maybeSingle();

      if(error) throw error;
      if(!data){ renderEmpty(profile); return; }
      if(data.status === 'geen_planning'){ renderNoWork(data); return; }
      renderPlanning(data);
    }catch(e){
      console.error(e);
      renderError();
    }
  }

  function setGreeting(name){
    $('greeting').innerHTML = name
      ? `Hoi <strong>${name}</strong>, hier is je planning.`
      : `Je planning`;
  }

  function showOnboarding(){
    $('onboarding').style.display = 'flex';
  }
  function hideOnboarding(){
    $('onboarding').style.display = 'none';
  }

  function init(){
    const profile = getProfile();
    if(!profile){
      showOnboarding();
      return;
    }
    setGreeting(null);
    loadPlanning(false);
  }

  // Onboarding opslaan
  $('obSave').addEventListener('click', () => {
    const driverId = $('obDriverId').value.trim();
    if(!driverId){
      $('obError').style.display = 'block';
      return;
    }
    saveProfile({ driverId });
    hideOnboarding();
    setGreeting(null);
    loadPlanning(false);
  });

  // Instellingen openen
  $('settingsBtn').addEventListener('click', () => {
    const profile = getProfile() || { driverId:'' };
    $('stDriverId').value = profile.driverId;
    $('stError').style.display = 'none';
    $('settings').style.display = 'flex';
  });
  $('stCancel').addEventListener('click', () => {
    $('settings').style.display = 'none';
  });
  $('stSave').addEventListener('click', () => {
    const driverId = $('stDriverId').value.trim();
    if(!driverId){
      $('stError').style.display = 'block';
      return;
    }
    saveProfile({ driverId });
    $('settings').style.display = 'none';
    setGreeting(null);
    loadPlanning(false);
  });

  init();
</script>
</body>
</html>
